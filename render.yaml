databases:
  - name: studyforge-db
    plan: free

services:
  - type: web
    name: studyforge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_URL
        fromDatabase:
          name: studyforge-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
