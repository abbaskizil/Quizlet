name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check server syntax
        run: node --check server.js

      - name: Check inline browser script syntax
        run: |
          node -e "const fs=require('fs'); const html=fs.readFileSync('files/index.html','utf8'); const m=html.match(/<script>([\s\S]*)<\/script>/); if(!m) throw new Error('script block not found'); new Function(m[1]);"
